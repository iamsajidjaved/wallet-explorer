<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Explorer - Multi-Network Transaction Tracker</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="container">
        <header>
            <h1 class="logo">🔗 Wallet Explorer</h1>
            <p class="subtitle">Track ERC-20 & TRC-20 Transactions Across Multiple Networks</p>
        </header>

        <div class="wallet-input-container">
            <div class="wallet-input-card card">
                <h2 style="margin-bottom: 2rem; font-size: 1.75rem;">Enter Wallet Address</h2>
                
                <form id="walletForm">
                    <div class="input-group">
                        <label for="walletAddress">Wallet Address</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="walletAddress" 
                                class="wallet-input" 
                                placeholder="Enter Wallet Address (0x... or T...)"
                                autocomplete="off"
                                spellcheck="false"
                            >
                        </div>
                        <div id="validationMessage" class="validation-message" style="display: none;"></div>
                    </div>

                    <div class="date-range-group">
                        <div class="input-group date-input-group">
                            <label for="fromDate">From Date <span style="color: var(--text-secondary); font-weight: 400;">(optional)</span></label>
                            <input
                                type="date"
                                id="fromDate"
                                class="wallet-input"
                            >
                        </div>
                        <div class="input-group date-input-group">
                            <label for="toDate">To Date <span style="color: var(--text-secondary); font-weight: 400;">(optional)</span></label>
                            <input
                                type="date"
                                id="toDate"
                                class="wallet-input"
                            >
                        </div>
                    </div>
                    <div id="dateRangeMessage" class="validation-message" style="display: none;"></div>

                    <div style="margin-bottom: 1.5rem; padding: 1rem; background: rgba(102, 126, 234, 0.1); border-radius: 8px; border-left: 4px solid var(--accent-blue);">
                        <div style="font-size: 0.9rem; color: var(--text-secondary);">
                            <strong style="color: var(--text-primary);">Supported Networks:</strong><br>
                            <span style="display: inline-flex; align-items: center; margin-top: 0.5rem;">
                                <span class="badge badge-erc" style="margin-right: 0.5rem;">ERC</span> Ethereum - Address starts with <code style="background: var(--bg-secondary); padding: 0.25rem 0.5rem; border-radius: 4px;">0x</code>
                            </span>
                            <br>
                            <span style="display: inline-flex; align-items: center; margin-top: 0.5rem;">
                                <span class="badge badge-trc" style="margin-right: 0.5rem;">TRC</span> Tron - Address starts with <code style="background: var(--bg-secondary); padding: 0.25rem 0.5rem; border-radius: 4px;">T</code>
                            </span>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary" disabled>
                        Get Transactions
                    </button>
                </form>

                <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-color);">
                    <p style="color: var(--text-secondary); font-size: 0.9rem; text-align: center;">
                        <strong>Try these examples:</strong>
                    </p>
                    <div style="display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; justify-content: center;">
                        <button class="btn btn-secondary example-btn" style="padding: 0.5rem 1rem; font-size: 0.85rem;" data-address="0xde0b295669a9fd93d5f28d9ec85e40f4cb697bae">
                            ETH Example
                        </button>
                        <button class="btn btn-secondary example-btn" style="padding: 0.5rem 1rem; font-size: 0.85rem;" data-address="TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t">
                            TRX Example
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/wallet.js"></script>
</body>
</html>
